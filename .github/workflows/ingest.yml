name: Ingest Knowledge Base

on:
  push:
    branches: [main]
    paths:
      - "knowledge-base/**"   # only runs when PDFs change, not on every push

  workflow_dispatch:          # lets you trigger it manually from GitHub Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Ingest documents into Supabase
        run: npm run ingest -- --force
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
